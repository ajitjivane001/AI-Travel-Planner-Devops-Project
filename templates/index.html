<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Travel Planner</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: zoomBg 12s ease-in-out infinite;
        }

        @keyframes zoomBg {
            0% { background-size: 100%; }
            50% { background-size: 110%; }
            100% { background-size: 100%; }
        }

        .container {
            width: 430px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px);
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
            animation: fadeUp 1.2s ease, float 6s ease-in-out infinite;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* ===== TEXT STYLES ===== */

        h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        label {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
            font-weight: 400;
            color: #333;
            transition: all 0.35s ease;
            margin-bottom: 18px;
        }

        input::placeholder {
            color: #aaa;
            font-weight: 300;
        }

        input:focus, select:focus {
            transform: scale(1.04);
            box-shadow: 0 0 18px rgba(255,255,255,0.6);
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 30px;
            padding: 13px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        input[type="submit"]:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 35px rgba(0,0,0,0.45);
        }

        input[type="submit"]:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

<div class="container">

    <h2>🌍 AI Travel Planner</h2>

    <form method="post">

        <label>Enter Your City</label>
        <input type="text" name="inp1" placeholder="e.g. Mumbai">

        <label>Enter Your Budget</label>
        <input type="number" name="inp2" placeholder="e.g. 25000">

        <label>Enter Number of Days</label>
        <input type="number" name="inp3" placeholder="e.g. 5">

        <label>Select Your Interest</label>
        <select name="inp4">
            <option value="None">None</option>
            <option value="Trake">Trek</option>
            <option value="Camping">Camping</option>
            <option value="Club">Club</option>
            <option value="Hiking">Hiking</option>
            <option value="Water Sport">Water Sports</option>
        </select>

        <input type="submit" value="Plan My Trip ✈️">

    </form>

</div>

</body>
</html>
