apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-travel-planner
  labels:
    app: ai-travel-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-travel-planner
  template:
    metadata:
      labels:
        app: ai-travel-planner
    spec:
      containers:
      - name: flask-app
        image: ajitjivane001/ai-travel-planner-devops-project-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-travel-planner-secrets
              key: GOOGLE_API_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

