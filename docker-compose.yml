version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: database
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops
      MYSQL_USER: ajit
      MYSQL_PASSWORD: ajit
    restart: always
    networks:
      - ai-app-network

  app:
    build: .
    container_name: ai-app
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      MYSQL_HOST: database
      MYSQL_USER: ajit
      MYSQL_PASSWORD: ajit
      MYSQL_DATABASE: devops
    expose:
      - "5000"
    networks:
      - ai-app-network

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ai-app-network

volumes:
  mysql-data:

networks:
  ai-app-network:
